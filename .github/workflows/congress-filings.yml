name: Congress filing notifier

on:
  schedule:
    # Every 15 minutes. The real latency floor is the House Clerk's own
    # publication lag (hours-to-days after a member files) plus GitHub's
    # best-effort scheduling (a run can be delayed/dropped under load), so
    # polling faster than ~15 min buys almost nothing. Public repo => free.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # to commit updated seen.json / filings.json

concurrency:
  group: congress-filings
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install notifier dependencies
        run: python3 -m pip install -r notifier/requirements.txt

      - name: Check for new filings and push notifications
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_CONSENSUS_TOPIC: ${{ secrets.NTFY_CONSENSUS_TOPIC }}
        run: python3 notifier/check_filings.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notifier/seen.json notifier/seen_consensus.json notifier/filings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            # ***NO_CI*** stops the Azure Pipelines deploy from running on data-only updates.
            git commit -m "data: update congress filings ***NO_CI***"
            git push
          fi
